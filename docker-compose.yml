version: "3.9"

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:15-alpine
    container_name: steel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-steel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steel_pass_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-steel_defects}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steel_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: steel_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-steel_user}:${POSTGRES_PASSWORD:-steel_pass_change_me}@db:5432/${POSTGRES_DB:-steel_defects}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      MODEL_PATH: ${MODEL_PATH:-/app/model/best_model.pt}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
    ports:
      - "8000:8000"
    volumes:
      - ./ai/checkpoints:/app/model:ro
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ─── React Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: steel_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
